<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main">
        <h1>Sistema de Recomendação de Filmes</h1>

        <div class="row mt-3">
            <!-- PERFIL -->
            <div class="col-md-6">
                <div class="card mb-4 h-100">
                    <div class="card-header">
                        <h4>Perfil do Usuário</h4>
                    </div>
                    <div class="card-body">
                        <form id="userForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="userSelect" class="form-label">
                                        Selecione o Usuário
                                    </label>
                                    <select class="form-select" id="userSelect">
                                        <option value="">
                                            -- Selecione o usuário --
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="userAge" class="form-label">
                                        Idade
                                    </label>
                                    <input type="number"
                                        class="form-control"
                                        id="userAge"
                                        disabled>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- TREINAMENTO -->
            <div class="col-md-6">
                <div class="card mb-4 h-100">
                    <div class="card-header">
                        <h4>Treinamento do Modelo</h4>
                    </div>
                    <div class="card-body">
                        <div class="model-controls d-flex gap-2 mb-3">
                            <button id="trainModelBtn"
                                    class="btn btn-primary">
                                Treinar Modelo
                            </button>

                            <button disabled
                                    id="runRecommendationBtn"
                                    class="btn btn-success">
                                Executar Recomendação
                            </button>
                        </div>

                        <div class="all-users-purchases">
                            <h5 id="purchasesDiv"
                                style="cursor: pointer;">
                                Todas as Avaliações
                            </h5>

                            <div id="allUsersPurchasesList"
                                class="user-purchases-data overflow-auto"
                                style="max-height: 400px; display: none;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILMES -->
        <h3 class="mt-4">Filmes</h3>

        <div class="row row-cols-2 row-cols-md-4 g-3"
            id="movieList">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.5.1/dist/tfjs-vis.umd.min.js"></script>
    <script type="module" src="./src/index.js"></script>
</body>

</html>
