<div class="col-md-3">
    <div class="card movie-card">
        <div class="card-body">
            <h5 class="card-title">{{title}}</h5>

            <p class="card-text">
                <strong>Gênero:</strong> {{genre}}<br>
                <strong>Lançamento:</strong> {{releaseYear}}<br>
            </p>
            
            <div class="rating">
                ⭐ {{averageRating}}
                <span class="count">
                    ({{ratingsCount}} avaliações)
                </span>
            </div>
            
            <select class="rating-select" data-movie-id="{{id}}">
                <option value="">Avaliar</option>
                <option value="1">⭐ 1</option>
                <option value="2">⭐ 2</option>
                <option value="3">⭐ 3</option>
                <option value="4">⭐ 4</option>
                <option value="5">⭐ 5</option>
            </select>
        </div>
    </div>
</div>
