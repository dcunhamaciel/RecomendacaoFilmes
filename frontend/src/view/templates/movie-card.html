<div class="col">
    <div class="card movie-card h-100 {{ratedClass}}">
        <div class="card-body d-flex flex-column">

            <h6 class="card-title">{{title}}</h6>

            <p class="small mb-2">
                {{genre}} • {{releaseYear}}
            </p>

            <div class="mb-2">
                ⭐ {{averageRating}}
                <span class="text-muted small">
                    ({{ratingsCount}})
                </span>
            </div>

            {{userRatingBadge}}

            <select class="rating-select mt-auto form-select form-select-sm"
                    data-movie-id="{{id}}">
                <option value="">Avaliar</option>
                <option value="1">⭐ 1</option>
                <option value="2">⭐ 2</option>
                <option value="3">⭐ 3</option>
                <option value="4">⭐ 4</option>
                <option value="5">⭐ 5</option>
            </select>

        </div>
    </div>
</div>
