<div class="col">
  <div class="card h-100 border-success border-2">
    <div class="card-body">  
      <h6 class="card-title">{{title}}</h6>

      <p class="card-text small text-muted">
        {{genre}} • {{releaseYear}}
      </p>

      <small>
        ⭐ {{averageRating}} ({{ratingsCount}})
      </small>

      <span class="badge bg-success mb-2 ms-2">
        Score: {{score}}%
      </span>      
    </div>
  </div>
</div>
